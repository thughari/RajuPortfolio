
@if (isLoading()) {
  <div class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
    <div class="flex flex-col items-center">
      <div class="animate-spin rounded-full h-24 w-24 border-t-2 border-b-2 border-cyan-500"></div>
      <p class="text-xl text-slate-300 mt-4">Loading Portfolio...</p>
    </div>
  </div>
} @else {
  <div class="relative min-h-screen bg-slate-900 text-slate-300 font-sans">
    <div class="absolute inset-0 -z-10 h-full w-full bg-slate-900 bg-[linear-gradient(to_right,#8080800a_1px,transparent_1px),linear-gradient(to_bottom,#8080800a_1px,transparent_1px)] bg-[size:14px_24px]">
      <div class="absolute left-0 right-0 top-0 -z-10 m-auto h-[310px] w-[310px] rounded-full bg-cyan-400 opacity-20 blur-[100px]"></div>
    </div>
    
    <app-header></app-header>
    
    <main class="container mx-auto px-6 md:px-12">
      <app-hero></app-hero>
      <app-about></app-about>
      <app-skills></app-skills>
      <app-experience></app-experience>
      <app-projects></app-projects>
      <app-certifications></app-certifications>
      <app-contact></app-contact>
    </main>
    
    <app-footer></app-footer>
  </div>
}
