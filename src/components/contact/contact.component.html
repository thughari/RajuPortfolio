
<section id="contact" class="py-24">
  <div class="text-center mb-12">
    <h2 class="text-4xl font-extrabold text-white">Get In Touch</h2>
    <p class="text-slate-400 mt-2">I'm open to new opportunities and collaborations.</p>
  </div>
  <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 bg-slate-800/50 backdrop-blur-sm rounded-2xl p-8 md:p-12 shadow-2xl border border-slate-700">
    <div>
      <h3 class="text-2xl font-bold text-white mb-4">Contact Information</h3>
      <p class="text-slate-300 mb-6">Feel free to reach out via email or connect with me on social media. I'm always happy to chat about data, technology, or exciting new projects.</p>
      <div class="space-y-4">
        <div class="flex items-center">
          <svg class="w-6 h-6 text-cyan-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          <a [href]="'mailto:' + email" class="text-slate-300 hover:text-cyan-400 transition-colors">{{ email }}</a>
        </div>
         <div class="flex items-center">
          <svg class="w-6 h-6 text-cyan-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
          <a href="tel:+919951833517" class="text-slate-300 hover:text-cyan-400 transition-colors">+91-99518-33517</a>
        </div>
        <div class="flex items-center">
          <svg class="w-6 h-6 text-cyan-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span class="text-slate-300">Hyderabad, India</span>
        </div>
      </div>
    </div>
    <form #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-slate-300 mb-1">Your Name</label>
        <input type="text" id="name" name="name" ngModel required class="w-full bg-slate-700 border border-slate-600 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Your Email</label>
        <input type="email" id="email" name="email" ngModel required email class="w-full bg-slate-700 border border-slate-600 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500">
      </div>
      <div>
        <label for="message" class="block text-sm font-medium text-slate-300 mb-1">Message</label>
        <textarea id="message" name="message" rows="4" ngModel required class="w-full bg-slate-700 border border-slate-600 rounded-md py-2 px-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500"></textarea>
      </div>
      <button type="submit" [disabled]="!contactForm.form.valid" class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:shadow-cyan-500/50 transform hover:-translate-y-1 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
        Send Message
      </button>
    </form>
  </div>
</section>
