
<section id="experience" class="py-24">
  <div class="text-center mb-16">
    <h2 class="text-4xl font-extrabold text-white">Professional Experience</h2>
    <p class="text-slate-400 mt-2">My career journey and key accomplishments.</p>
  </div>
  <div class="relative max-w-5xl mx-auto timeline">
    @for (exp of experiences; track exp.role) {
      <div class="timeline-item mb-12">
        <div class="timeline-dot bg-cyan-500 w-4 h-4 rounded-full border-4 border-slate-700"></div>
        <div class="timeline-content w-full md:w-5/12 bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 shadow-2xl border border-slate-700">
          <h3 class="text-xl font-bold text-white">{{ exp.role }}</h3>
          <p class="text-cyan-400 font-semibold mb-2">{{ exp.company }}</p>
          <p class="text-slate-500 text-sm mb-4">{{ exp.period }}</p>
          <ul class="list-disc list-inside space-y-2 text-slate-300">
            @for (point of exp.points; track point) {
              <li>{{ point }}</li>
            }
          </ul>
        </div>
      </div>
    }
  </div>
</section>
