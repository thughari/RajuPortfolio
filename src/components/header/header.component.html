
<header 
  [class.bg-slate-900/80]="isScrolled()"
  [class.backdrop-blur-lg]="isScrolled()"
  [class.shadow-lg]="isScrolled()"
  class="sticky top-0 z-40 w-full transition-all duration-300">
  <nav class="container mx-auto px-6 md:px-12 py-4 flex items-center justify-between">
    <a href="#" class="text-2xl font-bold text-white tracking-wider">
      R<span class="text-cyan-400">.</span>B
    </a>
    <div class="hidden md:flex items-center space-x-8">
      @for (link of navLinks; track link.name) {
        <a [href]="link.href" class="text-slate-300 hover:text-cyan-400 transition-colors duration-300">{{ link.name }}</a>
      }
    </div>
    <div class="md:hidden">
      <button (click)="toggleMenu()" class="text-white focus:outline-none">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          @if (!isMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          }
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  @if (isMenuOpen()) {
    <div class="fixed inset-0 bg-slate-900 z-50 md:hidden">
      <div class="flex flex-col items-center justify-center h-full space-y-8">
        @for (link of navLinks; track link.name) {
          <a [href]="link.href" (click)="closeMenu()" class="text-2xl text-slate-300 hover:text-cyan-400 transition-colors duration-300">{{ link.name }}</a>
        }
      </div>
    </div>
  }
</header>
