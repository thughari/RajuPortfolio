
<section id="skills" class="py-24">
  <div class="text-center mb-12">
    <h2 class="text-4xl font-extrabold text-white">Technical Skills</h2>
    <p class="text-slate-400 mt-2">My proficiency in various technologies and platforms.</p>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    @for (category of skillCategories; track category.title) {
      <div class="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-6 shadow-2xl border border-slate-700 transform hover:-translate-y-2 transition-transform duration-300">
        <h3 class="text-2xl font-bold text-cyan-400 mb-4">{{ category.title }}</h3>
        <div class="flex flex-wrap gap-2">
          @for (skill of category.skills; track skill.name) {
            <span class="bg-slate-700 text-slate-200 text-sm font-medium px-3 py-1 rounded-full">
              {{ skill.name }}
            </span>
          }
        </div>
      </div>
    }
  </div>
</section>
